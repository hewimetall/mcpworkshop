services:
  agent-lsp:
    build: .
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8888:8888"
    volumes:
      - ${HOME}:${HOME}
      - lsp-server-cache:/var/cache/lsp-servers
    working_dir: /workspace
    environment:
      - HOME=/tmp
      - AGENT_LSP_TOKEN=token
    command:
      - "--http"
      - "--port"
      - "8888"
      - "--listen-addr"
      - "0.0.0.0"
      - "python:pyright-langserver,--stdio"
      - "typescript:typescript-language-server,--stdio"
      - "html:vscode-html-language-server,--stdio"
      - "css:vscode-css-language-server,--stdio"
      - "dockerfile:docker-langserver,--stdio"
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"
volumes:
  lsp-server-cache: